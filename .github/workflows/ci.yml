name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: spire-nhp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run test suite
        run: docker run --rm spire-nhp:ci python -m pytest tests/ -v

      - name: Smoke-test daemon startup (software mode)
        run: |
          docker run --rm spire-nhp:ci \
            timeout 5 python -m nhp_daemon 2>&1 | tee daemon.log
          grep -q "SPIRE NHP Daemon Ready" daemon.log
